<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agentic Expense Logger</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container theme-dark">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-wallet gradient-text"></i> ExpenseLogger</h2>
                <button id="new-chat-btn" class="icon-btn" title="New Chat"><i class="fa-solid fa-pen-to-square"></i></button>
            </div>
            <div class="sidebar-content">
                <p class="sidebar-label">Recent</p>
                <div class="chat-history">
                    <div class="chat-item active">
                        <i class="fa-regular fa-message"></i>
                        <span>Current Session</span>
                    </div>
                </div>
            </div>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar-sm">U</div>
                    <span>User</span>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <header class="chat-header">
                <button id="mobile-menu-btn" class="icon-btn mobile-only"><i class="fa-solid fa-bars"></i></button>
                <h3 class="model-name">Agentic Expense AI <span class="badge">Beta</span></h3>
                <div class="header-actions">
                    <button id="theme-toggle" class="icon-btn" title="Toggle Theme"><i class="fa-solid fa-sun"></i></button>
                </div>
            </header>

            <div class="chat-messages" id="chat-messages">
                <div class="welcome-container">
                    <div class="welcome-icon"><i class="fa-solid fa-money-bill-wave"></i></div>
                    <h1>How can I help you today?</h1>
                    <p>Log expenses or query your spending history.</p>
                </div>
            </div>

            <div class="chat-input-wrapper">
                <div class="chat-input-container">
                    <form id="chat-form" class="chat-form">
                        <button type="button" class="action-btn" title="Attach (coming soon)"><i class="fa-solid fa-plus"></i></button>
                        <textarea id="message-input" placeholder="Message ExpenseLogger..." rows="1" autofocus></textarea>
                        <button type="submit" class="send-btn" id="send-btn" disabled><i class="fa-solid fa-arrow-up"></i></button>
                    </form>
                </div>
                <div class="input-footer">
                    ExpenseLogger can make mistakes. Verify important financial data.
                </div>
            </div>
        </main>
    </div>
    
    <!-- Template for messages -->
    <template id="message-template">
        <div class="message">
            <div class="avatar"></div>
            <div class="message-content">
                <div class="message-text"></div>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
